<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: base(
    titulo='Listado de Usuarios',
    contenido=~{::section}
)}">
<head>
  <meta charset="UTF-8">
  <title>Listado de Usuarios</title>
</head>
<body>
<section>
  <div class="row mb-3">
    <div class="col">
      <a th:href="@{/usuarios/nuevo}" class="btn btn-primary">+ Nuevo Usuario</a>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
      <tr>
        <th>Código</th>
        <th>Username</th>
        <th>Email</th>
        <th>Rol</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="usuario : ${usuarios}">
        <td th:text="${usuario.codigoUsuario}"></td>
        <td th:text="${usuario.username}"></td>
        <td th:text="${usuario.email}"></td>
        <td>
          <span th:if="${usuario.rol == 'ADMIN'}" class="badge bg-danger">ADMIN</span>
          <span th:if="${usuario.rol == 'USER'}" class="badge bg-primary">USER</span>
          <span th:if="${usuario.rol != 'ADMIN' and usuario.rol != 'USER'}"
                class="badge bg-secondary" th:text="${usuario.rol}"></span>
        </td>
        <td>
          <span th:if="${usuario.estado == 1}" class="badge bg-success">Activo</span>
          <span th:if="${usuario.estado == 0}" class="badge bg-danger">Inactivo</span>
        </td>
        <td>
          <a th:href="@{/usuarios/editar/{codigo}(codigo=${usuario.codigoUsuario})}"
             class="btn btn-sm btn-warning">Editar</a>
          <a th:href="@{/usuarios/eliminar/{codigo}(codigo=${usuario.codigoUsuario})}"
             class="btn btn-sm btn-danger"
             onclick="return confirm('¿Estás seguro de eliminar este usuario?')">Eliminar</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</section>
</body>
</html>
