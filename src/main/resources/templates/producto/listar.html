<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: base(
    titulo='Listado de Productos',
    contenido=~{::section}
)}">
<head>
    <meta charset="UTF-8">
    <title>Listado de Productos</title>
</head>
<body>
<section>
    <div class="row mb-3">
        <div class="col">
            <a th:href="@{/productos/nuevo}" class="btn btn-primary">+ Nuevo Producto</a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="producto : ${productos}">
                <td th:text="${producto.codigoProducto}"></td>
                <td th:text="${producto.nombreProducto}"></td>
                <td th:text="'Q' + ${producto.precio}"></td>
                <td th:text="${producto.stock}"></td>
                <td>
                    <span th:if="${producto.estado == 1}" class="badge bg-success">Activo</span>
                    <span th:if="${producto.estado == 0}" class="badge bg-danger">Inactivo</span>
                </td>
                <td>
                    <a th:href="@{/productos/editar/{codigo}(codigo=${producto.codigoProducto})}"
                       class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/productos/eliminar/{codigo}(codigo=${producto.codigoProducto})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Estás seguro de eliminar este producto?')">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
