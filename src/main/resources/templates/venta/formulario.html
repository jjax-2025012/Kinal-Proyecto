<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Nueva Venta</h1>
    <div class="alert alert-info">Las ventas no se pueden editar ni eliminar. Solo anular.</div>

    <form th:action="@{/ventas/guardar}" method="post">
        <div class="mb-3">
            <label>Cliente</label>
            <select class="form-control" name="dpiCliente" required>
                <option value="">Seleccione un cliente</option>
                <option th:each="cliente : ${clientes}"
                        th:value="${cliente.dpiCliente}"
                        th:text="${cliente.nombreCliente} + ' ' + ${cliente.apellidoCliente} + ' - ' + ${cliente.dpiCliente}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label>Usuario</label>
            <select class="form-control" name="codigoUsuario" required>
                <option value="">Seleccione un usuario</option>
                <option th:each="usuario : ${usuarios}"
                        th:value="${usuario.codigoUsuario}"
                        th:text="${usuario.username} + ' - ' + ${usuario.rol}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Crear Venta</button>
        <a th:href="@{/ventas}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
