<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos - KinalApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="app-container">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="main-content">
        <div class="top-bar">
            <h1>Gestion de Productos</h1>
            <a th:href="@{/productos/nuevo}" class="btn-primary"> Nuevo Producto</a>
        </div>

        <table class="data-table">
            <thead>
            <tr>
                <th>Codigo</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="producto : ${productos}">
                <td th:text="${producto.codigoProducto}"></td>
                <td th:text="${producto.nombreProducto}"></td>
                <td th:text="'Q' + ${producto.precio}"></td>
                <td th:text="${producto.stock}"></td>
                <td>
                    <span th:if="${producto.estado == 1}" class="badge-success">Activo</span>
                    <span th:if="${producto.estado == 0}" class="badge-danger">Inactivo</span>
                </td>
                <td>
                    <a th:href="@{/productos/editar/{codigo}(codigo=${producto.codigoProducto})}" class="btn-warning">Editar</a>
                    <a th:href="@{/productos/eliminar/{codigo}(codigo=${producto.codigoProducto})}" class="btn-danger" onclick="return confirm('Eliminar este producto?')">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </main>
</div>
</body>
</html>
