<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KinalApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card text-center">
        <div class="card-header bg-primary text-white">
            <h1>KinalApp</h1>
        </div>
        <div class="card-body">
            <h2>Bienvenido</h2>
            <p>Gestión Eficiente de Ventas</p>
            <hr>
            <div class="row">
                <div class="col-md-3">
                    <a th:href="@{/clientes}" class="btn btn-primary w-100 mb-2">Clientes</a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/productos}" class="btn btn-success w-100 mb-2">Productos</a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/ventas}" class="btn btn-info w-100 mb-2">Ventas</a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/usuarios}" class="btn btn-warning w-100 mb-2">Usuarios</a>
                </div>
            </div>
        </div>
        <div class="card-footer text-muted">
            KinalApp - Todos los derechos reservados
        </div>
    </div>
</div>
</body>
</html>
