<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Listado de Productos</h1>
    <a th:href="@{/productos/nuevo}" class="btn btn-primary mb-3">Nuevo Producto</a>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="producto : ${productos}">
            <td th:text="${producto.codigoProducto}"></td>
            <td th:text="${producto.nombreProducto}"></td>
            <td th:text="'Q' + ${producto.precio}"></td>
            <td th:text="${producto.stock}"></td>
            <td>
                <span th:if="${producto.estado == 1}" class="badge bg-success">Activo</span>
                <span th:if="${producto.estado == 0}" class="badge bg-danger">Inactivo</span>
            </td>
            <td>
                <a th:href="@{/productos/editar/{codigo}(codigo=${producto.codigoProducto})}" class="btn btn-sm btn-warning">Editar</a>
                <a th:href="@{/productos/eliminar/{codigo}(codigo=${producto.codigoProducto})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/}" class="btn btn-secondary">Volver al Inicio</a>
</div>
</body>
</html>
