<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes - KinalApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="app-container">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="main-content">
        <div class="top-bar">
            <h1>Gestion de Clientes</h1>
            <a th:href="@{/clientes/nuevo}" class="btn-primary"> Nuevo Cliente</a>
        </div>

        <table class="data-table">
            <thead>
            <tr>
                <th>DPI</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Direccion</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cliente : ${clientes}">
                <td th:text="${cliente.dpiCliente}"></td>
                <td th:text="${cliente.nombreCliente}"></td>
                <td th:text="${cliente.apellidoCliente}"></td>
                <td th:text="${cliente.direccion}"></td>
                <td>
                    <span th:if="${cliente.estado == 1}" class="badge-success">Activo</span>
                    <span th:if="${cliente.estado == 0}" class="badge-danger">Inactivo</span>
                </td>
                <td>
                    <a th:href="@{/clientes/editar/{dpi}(dpi=${cliente.dpiCliente})}" class="btn-warning">Editar</a>
                    <a th:href="@{/clientes/eliminar/{dpi}(dpi=${cliente.dpiCliente})}" class="btn-danger" onclick="return confirm('Eliminar este cliente?')">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </main>
</div>
</body>
</html>
