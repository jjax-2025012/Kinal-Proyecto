<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Clientes - KinalApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="d-flex">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between mb-3">
            <h1>Clientes</h1>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/clientes/nuevo}" class="btn btn-primary">Nuevo Cliente</a>
        </div>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>DPI</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Dirección</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cliente : ${clientes}">
                <td th:text="${cliente.dpiCliente}"></td>
                <td th:text="${cliente.nombreCliente}"></td>
                <td th:text="${cliente.apellidoCliente}"></td>
                <td th:text="${cliente.direccion}"></td>
                <td>
                    <span th:if="${cliente.estado == 1}" class="badge bg-success">Activo</span>
                    <span th:if="${cliente.estado == 0}" class="badge bg-danger">Inactivo</span>
                </td>
                <td>
                    <a sec:authorize="hasRole('ADMIN')"
                       th:href="@{/clientes/editar/{dpi}(dpi=${cliente.dpiCliente})}"
                       class="btn btn-sm btn-warning">Editar</a>
                    <a sec:authorize="hasRole('ADMIN')"
                       th:href="@{/clientes/eliminar/{dpi}(dpi=${cliente.dpiCliente})}"
                       class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
        <a th:href="@{/}" class="btn btn-secondary">Volver al Inicio</a>
    </div>
</div>
</body>
</html>
