<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: base(
    titulo='Listado de Ventas',
    contenido=~{::section}
)}">
<head>
    <meta charset="UTF-8">
    <title>Listado de Ventas</title>
</head>
<body>
<section>
    <div class="row mb-3">
        <div class="col">
            <a th:href="@{/ventas/nuevo}" class="btn btn-primary">+ Nueva Venta</a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>Código</th>
                <th>Fecha</th>
                <th>Cliente</th>
                <th>Usuario</th>
                <th>Total</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="venta : ${ventas}">
                <td th:text="${venta.codigoVenta}"></td>
                <td th:text="${venta.fechaVenta}"></td>
                <td th:text="${venta.cliente.nombreCliente + ' ' + venta.cliente.apellidoCliente}"></td>
                <td th:text="${venta.usuario.username}"></td>
                <td th:text="'Q' + ${venta.total}"></td>
                <td>
                    <span th:if="${venta.estado == 1}" class="badge bg-success">Activa</span>
                    <span th:if="${venta.estado == 0}" class="badge bg-danger">Anulada</span>
                </td>
                <td>
                    <a th:href="@{/ventas/detalle/{codigo}(codigo=${venta.codigoVenta})}"
                       class="btn btn-sm btn-info">Ver Detalle</a>

                    <a th:if="${venta.estado == 1}"
                       th:href="@{/ventas/anular/{codigo}(codigo=${venta.codigoVenta})}"
                       class="btn btn-sm btn-warning"
                       onclick="return confirm('¿Estás seguro de anular esta venta? Esta acción no se puede deshacer.')">Anular</a>

                    <!-- NOTA: NO hay botón de eliminar ni editar por cumplimiento fiscal -->
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
