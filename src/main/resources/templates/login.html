<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - KinalApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #004A99 0%, #002d5e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            max-width: 400px;
            margin: 100px auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: none;
        }
        .card-header {
            background: linear-gradient(135deg, #004A99 0%, #003d7a 100%);
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
        }
        .btn-kinal {
            background-color: #F57F20;
            border-color: #F57F20;
            color: white;
            font-weight: 500;
            padding: 12px;
            transition: all 0.3s ease;
        }
        .btn-kinal:hover {
            background-color: #e06a10;
            transform: translateY(-2px);
            color: white;
        }
        .alert-error {
            display: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card login-card">
        <div class="card-header text-white text-center">
            <h3>🏪 KinalApp</h3>
            <small>Sistema de Gestión de Ventas</small>
        </div>
        <div class="card-body">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" id="username" class="form-control" placeholder="Ingrese su usuario" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="Ingrese su contraseña" required>
                </div>
                <button type="submit" class="btn btn-kinal w-100">Iniciar Sesión</button>
                <div id="errorMessage" class="alert alert-danger alert-error"></div>
            </form>
        </div>
        <div class="card-footer text-center text-muted">
            <small>© 2026 KinalApp - Todos los derechos reservados</small>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');

        try {
            const response = await fetch('http://localhost:8081/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Guardar datos de usuario en sessionStorage
                sessionStorage.setItem('usuario', JSON.stringify(data));
                // Redirigir al dashboard
                window.location.href = '/clientes';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.textContent = data.error || 'Error al iniciar sesión';
            }
        } catch (error) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Error de conexión con el servidor';
        }
    });
</script>
</body>
</html>
