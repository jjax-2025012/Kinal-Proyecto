<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: base(
    titulo='Listado de Clientes',
    contenido=~{::section}
)}">
<head>
    <meta charset="UTF-8">
    <title>Listado de Clientes</title>
</head>
<body>
<section>
    <div class="row mb-3">
        <div class="col">
            <a th:href="@{/clientes/nuevo}" class="btn btn-primary">+ Nuevo Cliente</a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>DPI</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Dirección</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cliente : ${clientes}">
                <td th:text="${cliente.dpiCliente}"></td>
                <td th:text="${cliente.nombreCliente}"></td>
                <td th:text="${cliente.apellidoCliente}"></td>
                <td th:text="${cliente.direccion}"></td>
                <td>
                    <span th:if="${cliente.estado == 1}" class="badge bg-success">Activo</span>
                    <span th:if="${cliente.estado == 0}" class="badge bg-danger">Inactivo</span>
                </td>
                <td>
                    <a th:href="@{/clientes/editar/{dpi}(dpi=${cliente.dpiCliente})}"
                       class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/clientes/eliminar/{dpi}(dpi=${cliente.dpiCliente})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Estás seguro de eliminar este cliente?')">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
