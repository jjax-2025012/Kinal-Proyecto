<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Detalle de Venta #<span th:text="${venta.codigoVenta}"></span></h1>

    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            <h3>Información de la Venta</h3>
        </div>
        <div class="card-body">
            <p><strong>Fecha:</strong> <span th:text="${venta.fechaVenta}"></span></p>
            <p><strong>Cliente:</strong> <span th:text="${venta.cliente.nombreCliente} + ' ' + ${venta.cliente.apellidoCliente}"></span></p>
            <p><strong>Estado:</strong>
                <span th:if="${venta.estado == 1}" class="badge bg-success">Activa</span>
                <span th:if="${venta.estado == 0}" class="badge bg-danger">Anulada</span>
            </p>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-secondary text-white">
            <h4>Productos Vendidos</h4>
        </div>
        <div class="card-body">
            <table class="table table-bordered">
                <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio Unitario</th>
                    <th>Subtotal</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="detalle : ${venta.detalles}">
                    <td th:text="${detalle.producto.nombreProducto}"></td>
                    <td th:text="${detalle.cantidad}"></td>
                    <td th:text="'Q' + ${detalle.precioUnitario}"></td>
                    <td th:text="'Q' + ${detalle.subtotal}"></td>
                </tr>
                <tr th:if="${venta.detalles.isEmpty()}">
                    <td colspan="4" class="text-center">No hay productos en esta venta</td>
                </tr>
                </tbody>
                <tfoot>
                <tr class="table-dark">
                    <th colspan="3" class="text-end">TOTAL:</th>
                    <th th:text="'Q' + ${venta.total}"></th>
                </tr>
                </tfoot>
            </table>

            <a th:if="${venta.estado == 1}" th:href="@{/detalles-venta/nuevo/{codigo}(codigo=${venta.codigoVenta})}" class="btn btn-success mt-3">Agregar Producto</a>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/ventas}" class="btn btn-secondary">Volver al Listado</a>
    </div>
</div>
</body>
</html>
