<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Formulario de Cliente</h1>
    <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">
        <div class="mb-3">
            <label>DPI</label>
            <input type="text" class="form-control" th:field="*{dpiCliente}" required>
        </div>
        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" class="form-control" th:field="*{nombreCliente}" required>
        </div>
        <div class="mb-3">
            <label>Apellido</label>
            <input type="text" class="form-control" th:field="*{apellidoCliente}" required>
        </div>
        <div class="mb-3">
            <label>Dirección</label>
            <input type="text" class="form-control" th:field="*{direccion}" required>
        </div>
        <div class="mb-3">
            <label>Estado</label>
            <select class="form-control" th:field="*{estado}">
                <option th:value="1">Activo</option>
                <option th:value="0">Inactivo</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/clientes}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
