<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Listado de Ventas</h1>
    <a th:href="@{/ventas/nuevo}" class="btn btn-primary mb-3">Nueva Venta</a>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Código</th>
            <th>Fecha</th>
            <th>Cliente</th>
            <th>Usuario</th>
            <th>Total</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="venta : ${ventas}">
            <td th:text="${venta.codigoVenta}"></td>
            <td th:text="${venta.fechaVenta}"></td>
            <td th:text="${venta.cliente.nombreCliente} + ' ' + ${venta.cliente.apellidoCliente}"></td>
            <td th:text="${venta.usuario.username}"></td>
            <td th:text="'Q' + ${venta.total}"></td>
            <td>
                <span th:if="${venta.estado == 1}" class="badge bg-success">Activa</span>
                <span th:if="${venta.estado == 0}" class="badge bg-danger">Anulada</span>
            </td>
            <td>
                <!-- CORREGIDO: Agregado enlace al detalle -->
                <a th:href="@{/ventas/detalle/{codigo}(codigo=${venta.codigoVenta})}" class="btn btn-sm btn-info">Ver Detalle</a>
                <a th:if="${venta.estado == 1}" th:href="@{/ventas/anular/{codigo}(codigo=${venta.codigoVenta})}" class="btn btn-sm btn-warning" onclick="return confirm('¿Anular esta venta?')">Anular</a>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/}" class="btn btn-secondary">Volver al Inicio</a>
</div>
</body>
</html>
