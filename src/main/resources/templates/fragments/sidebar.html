<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="sidebar" class="bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">
    <h4 class="text-center mb-4">KinalApp</h4>
    <hr>
    <nav class="nav flex-column">
        <a th:href="@{/clientes}" class="nav-link text-white">Clientes</a>
        <a th:href="@{/productos}" class="nav-link text-white">Productos</a>
        <a th:href="@{/ventas}" class="nav-link text-white">Ventas</a>
        <a th:href="@{/usuarios}" class="nav-link text-white">Usuarios</a>
    </nav>
    <hr>
    <div class="mt-auto">
        <p id="usernameDisplay" class="small text-center"></p>
        <button onclick="cerrarSesion()" class="btn btn-danger btn-sm w-100">Cerrar Sesión</button>
    </div>
</div>

<script>
    function cerrarSesion() {
        // Limpiar sessionStorage
        sessionStorage.removeItem('usuario');

        // Limpiar cookies
        document.cookie = 'usuario=; path=/; expires=Thu, 01 Jan 1970 00:00:01 GMT;';
        document.cookie = 'username=; path=/; expires=Thu, 01 Jan 1970 00:00:01 GMT;';

        // Redirigir al login
        window.location.href = '/login';
    }

    // Mostrar nombre de usuario si existe
    const usuarioData = sessionStorage.getItem('usuario');
    const usernameDisplay = document.getElementById('usernameDisplay');

    if (usuarioData && usernameDisplay) {
        try {
            const usuario = JSON.parse(usuarioData);
            usernameDisplay.textContent = '👤 ' + usuario.username;
        } catch (e) {
            console.error('Error al parsear usuario:', e);
            usernameDisplay.textContent = '👤 Usuario';
        }
    } else if (usernameDisplay) {
        usernameDisplay.textContent = '👤 Usuario';
    }
</script>
</html>
