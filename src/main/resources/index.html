<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KinalApp</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">KinalApp</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/clientes}">Clientes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/productos}">Productos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/ventas}">Ventas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/usuarios}">Usuarios</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Contenido principal -->
<div class="container mt-5">
    <div class="card text-center">
        <div class="card-header">
            Bienvenido
        </div>
        <div class="card-body">
            <h1 class="card-title">KinalApp</h1>
            <p class="card-text">Sistema de gestión de ventas</p>
            <p class="card-text">Fecha y hora actual:
                <strong th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy HH:mm:ss')}"></strong>
            </p>
            <hr>
            <a th:href="@{/clientes}" class="btn btn-primary">Ver Clientes</a>
            <a th:href="@{/productos}" class="btn btn-success">Ver Productos</a>
            <a th:href="@{/ventas}" class="btn btn-info">Ver Ventas</a>
        </div>
        <div class="card-footer text-muted">
            KinalApp - Todos los derechos reservados
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
</html>
