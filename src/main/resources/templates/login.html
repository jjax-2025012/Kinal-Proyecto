<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - KinalApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h3>KinalApp</h3>
                    <small>Sistema de Gestión de Ventas</small>
                </div>
                <div class="card-body">

                    <!-- Mensaje de error de Spring Security -->
                    <div th:if="${param.error}" class="alert alert-danger">
                        Usuario o contraseña incorrectos.
                    </div>

                    <!-- Mensaje de logout -->
                    <div th:if="${param.logout}" class="alert alert-success">
                        Sesión cerrada correctamente.
                    </div>

                    <!-- FORM nativo para Spring Security (sin CSRF porque está deshabilitado) -->
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label>Usuario</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label>Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="#" data-bs-toggle="modal" data-bs-target="#registerModal">Registrarse</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Registro -->
<div class="modal fade" id="registerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Registro de Usuario</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label>Usuario</label>
                        <input type="text" id="regUsername" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="regEmail" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Contraseña</label>
                        <input type="password" id="regPassword" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Confirmar Contraseña</label>
                        <input type="password" id="regConfirmPassword" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Rol</label>
                        <select id="regRol" class="form-control">
                            <option value="USER">Usuario Normal</option>
                            <option value="ADMIN">Administrador</option>
                        </select>
                    </div>
                    <div id="registerError" class="alert alert-danger" style="display: none;"></div>
                    <div id="registerSuccess" class="alert alert-success" style="display: none;"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="registrarUsuario()">Registrarse</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let registerModal;

    document.addEventListener('DOMContentLoaded', function () {
        registerModal = new bootstrap.Modal(document.getElementById('registerModal'));
    });

    async function registrarUsuario() {
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;
        const rol = document.getElementById('regRol').value;

        const errorDiv = document.getElementById('registerError');
        const successDiv = document.getElementById('registerSuccess');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        if (username.length < 3) {
            errorDiv.textContent = 'El usuario debe tener al menos 3 caracteres';
            errorDiv.style.display = 'block';
            return;
        }

        if (password !== confirmPassword) {
            errorDiv.textContent = 'Las contraseñas no coinciden';
            errorDiv.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('/api/usuarios', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password, rol, estado: 1 })
            });

            if (response.ok) {
                successDiv.textContent = 'Usuario registrado exitosamente';
                successDiv.style.display = 'block';
                setTimeout(() => {
                    registerModal.hide();
                    document.getElementById('regUsername').value = '';
                }, 2000);
            } else {
                const data = await response.json();
                errorDiv.textContent = data.error || 'Error al registrar';
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = 'Error de conexión';
            errorDiv.style.display = 'block';
        }
    }
</script>
</body>
</html>
