<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: base(
    titulo='Formulario de Producto',
    contenido=~{::section}
)}">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Producto</title>
</head>
<body>
<section>
    <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
        <!-- Campo oculto para el código en caso de edición -->
        <input type="hidden" th:field="*{codigoProducto}" th:value="*{codigoProducto}">

        <div class="mb-3">
            <label for="nombreProducto" class="form-label">Nombre del Producto</label>
            <input type="text" class="form-control" id="nombreProducto" th:field="*{nombreProducto}" required>
        </div>

        <div class="mb-3">
            <label for="precio" class="form-label">Precio</label>
            <input type="number" step="0.01" class="form-control" id="precio" th:field="*{precio}" required>
        </div>

        <div class="mb-3">
            <label for="stock" class="form-label">Stock</label>
            <input type="number" class="form-control" id="stock" th:field="*{stock}" required>
        </div>

        <div class="mb-3">
            <label for="estado" class="form-label">Estado</label>
            <select class="form-control" id="estado" th:field="*{estado}">
                <option th:value="1">Activo</option>
                <option th:value="0">Inactivo</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/productos}" class="btn btn-secondary">Cancelar</a>
    </form>
</section>
</body>
</html>
