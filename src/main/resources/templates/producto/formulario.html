<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Formulario de Producto</h1>
    <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
        <input type="hidden" th:field="*{codigoProducto}">
        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" class="form-control" th:field="*{nombreProducto}" required>
        </div>
        <div class="mb-3">
            <label>Precio</label>
            <input type="number" step="0.01" class="form-control" th:field="*{precio}" required>
        </div>
        <div class="mb-3">
            <label>Stock</label>
            <input type="number" class="form-control" th:field="*{stock}" required>
        </div>
        <div class="mb-3">
            <label>Estado</label>
            <select class="form-control" th:field="*{estado}">
                <option th:value="1">Activo</option>
                <option th:value="0">Inactivo</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/productos}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
